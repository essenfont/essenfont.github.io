name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Install fonttools
        run: pip install fonttools brotli

      - name: Cache Unihan data
        id: unihan-cache
        uses: actions/cache@v4
        with:
          path: data/unihan
          key: unihan-v17-${{ hashFiles('scripts/gen-unihan-data.mjs') }}

      - name: Generate Unihan data
        if: steps.unihan-cache.outputs.cache-hit != 'true'
        run: node scripts/gen-unihan-data.mjs

      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
